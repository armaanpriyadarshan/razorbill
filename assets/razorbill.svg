<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- razorbill logo: a razorbill (Alca torda) riding low in the water.
       Black above, white below, one white stripe across the bill. -->
  <defs>
    <clipPath id="badge-clip">
      <rect x="0" y="0" width="256" height="256" rx="48"/>
    </clipPath>
    <clipPath id="body-clip">
      <ellipse cx="142" cy="142" rx="86" ry="46"/>
    </clipPath>
  </defs>

  <g clip-path="url(#badge-clip)">
    <!-- sky -->
    <rect x="0" y="0" width="256" height="256" fill="#f2eee4"/>

    <!-- body -->
    <ellipse cx="142" cy="142" rx="86" ry="46" fill="#16171b"/>
    <!-- white underside, kept inside the body -->
    <ellipse cx="158" cy="162" rx="66" ry="30" fill="#f8f6f0" clip-path="url(#body-clip)"/>

    <!-- neck and head -->
    <polygon points="52,102 96,84 122,132 74,140" fill="#16171b"/>
    <circle cx="62" cy="94" r="30" fill="#16171b"/>

    <!-- the bill: blunt, deep, unmistakably a razorbill's -->
    <rect x="4" y="86" width="48" height="24" rx="12" fill="#16171b"/>
    <!-- white bill stripe -->
    <rect x="24" y="81" width="6" height="33" rx="3" fill="#f8f6f0"/>
    <!-- white line from bill to eye -->
    <path d="M 44 92 Q 56 88 66 86" stroke="#f8f6f0" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- eye -->
    <circle cx="70" cy="86" r="3.5" fill="#f8f6f0"/>

    <!-- water -->
    <rect x="0" y="172" width="256" height="84" fill="#cfd8d6" opacity="0.92"/>
    <path d="M 0 172 Q 32 166 64 172 T 128 172 T 192 172 T 256 172"
          stroke="#b6c3c0" stroke-width="4" fill="none"/>
  </g>
</svg>
